<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Roavvy — Your Travel Story, Finally Visible</title>
    <meta name="description" content="Roavvy is a free AI-powered travel app that transforms your photo library into a living world map. Discover where you've been, unlock achievements, and create personalised travel merchandise — all on-device, no uploads." />
    <meta name="keywords" content="travel map app, countries visited tracker, travel achievements, UNESCO heritage sites, world map app, travel photo scanner, travel identity, free travel app iOS" />
    <link rel="canonical" href="https://www.roavvy.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.roavvy.com/" />
    <meta property="og:title" content="Roavvy — Your Travel Story, Finally Visible" />
    <meta property="og:description" content="Free iOS app that scans your photos on-device to build a living map of everywhere you've been. Achievements, daily UNESCO challenges, and personalised travel merchandise." />
    <meta property="og:image" content="https://www.roavvy.com/images/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Roavvy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@roavvy" />
    <meta name="twitter:title" content="Roavvy — Your Travel Story, Finally Visible" />
    <meta name="twitter:description" content="Free iOS app that turns your photo library into a living world map. On-device scanning, achievements, UNESCO challenges, and personalised travel merch." />
    <meta name="twitter:image" content="https://www.roavvy.com/images/og-image.jpg" />

    <!-- App meta -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MobileApplication",
      "name": "Roavvy",
      "description": "AI-powered travel discovery app that transforms your photo library into a living world map. Discover visited countries, unlock achievements, play daily UNESCO challenges, and create personalised travel merchandise — entirely on-device.",
      "url": "https://www.roavvy.com",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "iOS 16.0+",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GBP"
      },
      "featureList": [
        "On-device AI photo scanning — no uploads",
        "Interactive world map of visited countries",
        "Travel achievements and milestone badges",
        "Daily UNESCO World Heritage challenges",
        "Personalised travel merchandise",
        "Privacy-first design"
      ],
      "publisher": {
        "@type": "Organization",
        "name": "Roavvy",
        "url": "https://www.roavvy.com",
        "email": "support@roavvy.com"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

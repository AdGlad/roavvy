<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1436"
    height="1022"
    viewBox="0 0 1436 1022"
    version="1.1">

  <style>
    .stamp-date {
      font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-size: 71.0px;
      font-weight: 700;
      fill: {{COLOR}};
      letter-spacing: 2.0px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <image
      x="0"
      y="0"
      width="1436"
      height="1022"
      href="../mobile_png/singapore-sg-exit.png" />

  <text
      class="stamp-date"
      x="768.0"
      y="512.0"
      transform="rotate(0.0 768.0 512.0)">{{DATE}}</text>

</svg>

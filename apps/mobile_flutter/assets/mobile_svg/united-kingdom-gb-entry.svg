<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="814"
    height="542"
    viewBox="0 0 814 542"
    version="1.1">

  <style>
    .stamp-date {
      font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
      font-size: 37px;
      font-weight: 700;
      fill: {{COLOR}};
      letter-spacing: 2.0px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>

  <image
      x="0"
      y="0"
      width="814"
      height="542"
      href="united-kingdom-gb-entry.png" />

  <text
      class="stamp-date"
      x="407.0"
      y="271.0">{{DATE}}</text>

</svg>

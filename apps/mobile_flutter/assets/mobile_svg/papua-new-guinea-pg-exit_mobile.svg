<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="400"
    height="267"
    viewBox="0 0 400 267"
    version="1.1">

  <image
      x="0"
      y="0"
      width="400"
      height="267"
      href="../mobile_png/papua-new-guinea-pg-exit.png" />

  <text date-format="{{DATE_FORMAT}}"
      x="200.0"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Flutter: format / analyse / test / coverage ──────────────────────────────
  flutter_test:
    name: Flutter test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Analyse
        run: flutter analyze --no-fatal-infos --no-fatal-warnings 2>/tmp/analyze.txt; tail -5 /tmp/analyze.txt

      - name: Test with coverage
        run: flutter test --coverage
        env:
          CI: true

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Filter coverage (generated files)
        run: |
          lcov --remove coverage/lcov.info \
            '*.g.dart' \
            '*.freezed.dart' \
            '*.mocks.dart' \
            '*/generated/*' \
            -o coverage/lcov_filtered.info

      - name: Coverage threshold (40 %)
        run: |
          TOTAL=$(lcov --summary coverage/lcov_filtered.info 2>&1 \
            | grep 'lines......' | grep -oP '\d+\.\d+(?=%)' | head -1)
          echo "Line coverage: ${TOTAL}%"
          python3 -c "
          import sys
          total = float('${TOTAL}' or 0)
          if total < 40:
              print(f'Coverage {total:.1f}% is below 40% threshold')
              sys.exit(1)
          print(f'Coverage {total:.1f}% meets threshold')
          "

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-coverage
          path: apps/mobile_flutter/coverage/lcov_filtered.info
          retention-days: 7

  # ── Cloud Functions: TypeScript unit tests ────────────────────────────────────
  functions_test:
    name: Functions test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Firestore rules: Node.js rules-unit-testing ───────────────────────────────
  firestore_rules:
    name: Firestore rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: test/firestore-rules/package-lock.json

      - name: Install rules test dependencies
        run: npm ci
        working-directory: test/firestore-rules

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run rules tests (with Firestore emulator)
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-roavvy \
            "cd test/firestore-rules && npm test"
        env:
          FIRESTORE_EMULATOR_HOST: "127.0.0.1:8080"

  # ── Integration tests (T5) — requires macOS runner for iOS simulator ─────────
  integration:
    name: Integration tests
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Boot iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | grep -oE '[A-Z0-9-]{36}')
          xcrun simctl boot "$UDID" || true
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: flutter test integration_test/app_test.dart -d "$SIM_UDID"
